<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-Tracker 統合管理コンソール</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background-color: #121214 !important;
            color: #f8f9fa !important;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
        }

        .custom-card {
            background-color: #1a1b20 !important;
            border: 1px solid #2d2f36 !important;
            border-radius: 12px;
        }

        .form-control, .form-select {
            color: #ffffff !important;
            background-color: #25262e !important;
            border: 1px solid #404452 !important;
            border-radius: 6px;
        }
        .form-control:focus, .form-select:focus {
            border-color: #0d6efd !important;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25) !important;
        }
        .form-control::placeholder {
            color: #888ea8 !important;
        }

        label.form-label {
            color: #ced4da !important;
            font-weight: 500;
        }

        .text-muted-custom {
            color: #adb5bd !important;
        }

        .sub-title-text {
            color: #a0a0a5 !important;
        }

        .big-counter {
            font-size: 3.5rem;
            font-weight: 700;
            color: #198754;
            line-height: 1;
        }

        .custom-toast {
            background-color: rgba(26, 27, 32, 0.95) !important;
            border: 1px solid #2d2f36 !important;
            border-radius: 8px !important;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5) !important;
        }

        footer {
            border-top: 1px solid #2d2f36;
            background-color: #1a1b20;
            color: #6c757d;
            font-size: 0.9rem;
        }
    </style>
</head>
<body class="p-4">

    <div class="container-fluid main-content">
        <header class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-secondary border-opacity-20">
            <div>
                <h1 class="h3 fw-bold mb-1">Q-Tracker</h1>
                <p class="sub-title-text small mb-0">統合管理コンソール // リアルタイム同期システム</p>
            </div>
            <div class="d-flex align-items-center gap-2">
                <button id="reconnect-btn" class="btn btn-sm btn-outline-danger d-none" onclick="connectWS()">
                    <i class="bi bi-arrow-clockwise me-1"></i>再接続する
                </button>
                <div id="connection-badge" class="badge bg-secondary bg-opacity-10 text-secondary border border-secondary border-opacity-50 px-3 py-2 rounded-pill">
                    <i class="bi bi-circle-fill me-2 small"></i>CONNECTING...
                </div>
            </div>
        </header>

        <div class="row g-4">
            
            <div class="col-md-4">
                <div class="custom-card p-4 h-100">
                    <h3 class="h4 mb-4 fw-bold border-bottom border-secondary border-opacity-20 pb-2">
                        <i class="bi bi-sliders me-2 text-primary"></i>構成設定
                    </h3>
                    
                    <form id="configForm" onsubmit="submitConfig(event)">
                        <div class="mb-3">
                            <label for="page_title" class="form-label">ページタイトル</label>
                            <input type="text" class="form-control" id="page_title" name="page_title" value="{{.Config.PageTitle}}">
                        </div>

                        <div class="mb-3">
                            <label for="room_name" class="form-label">部屋名</label>
                            <input type="text" class="form-control" id="room_name" name="room_name" value="{{.Config.RoomName}}">
                        </div>

                        <div class="mb-3">
                            <label for="time_required" class="form-label">所要時間 (分)</label>
                            <input type="number" class="form-control" id="time_required" name="time_required" value="{{.Config.TimeRequired}}">
                        </div>

                        <div class="mb-4">
                            <button type="button" class="btn btn-outline-info w-100 text-start d-flex justify-content-between align-items-center" data-bs-toggle="modal" data-bs-target="#advancedConfigModal">
                                <span><i class="bi bi-gear-fill me-2"></i>時間・範囲の詳細設定を開く</span>
                                <i class="bi bi-chevron-right"></i>
                            </button>
                        </div>

                        <div class="mb-3">
                            <label for="infomation" class="form-label">アナウンス / お知らせ</label>
                            <textarea class="form-control" id="infomation" name="infomation" rows="4">{{.Config.Infomation}}</textarea>
                        </div>

                        <div class="form-check form-switch p-3 bg-secondary bg-opacity-10 rounded mb-3 d-flex justify-content-between align-items-center fs-5">
                            <label class="form-check-label ms-0" for="switch_booking_available" id="label_booking_status" style="color: #ffffff;">
                                {{if .Config.IsBookingAvailable}}発券受付中{{else}}発券停止中{{end}}
                            </label>
                            <input class="form-check-input m-0" type="checkbox" role="switch" id="switch_booking_available" {{if .Config.IsBookingAvailable}}checked{{end}} onchange="triggerConfigUpdate()">
                        </div>

                        <div class="form-check form-switch p-3 bg-secondary bg-opacity-10 rounded mb-4 d-flex justify-content-between align-items-center fs-5">
                            <label class="form-check-label ms-0" for="switch_service_available" id="label_service_status" style="color: #ffffff;">
                                {{if .Config.IsServiceAvailable}}サービス稼働中{{else}}サービス停止中{{end}}
                            </label>
                            <input class="form-check-input m-0" type="checkbox" role="switch" id="switch_service_available" {{if .Config.IsServiceAvailable}}checked{{end}} onchange="triggerConfigUpdate()">
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2.5 fs-5 fw-bold">
                            <i class="bi bi-save me-2"></i>設定を保存して適用
                        </button>
                    </form>
                </div>
            </div>

            <div class="col-md-8">
                <div class="custom-card p-4 mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h3 class="h4 mb-0 fw-bold"><i class="bi bi-people-fill me-2 text-success"></i>現在の待機列</h3>
                        <div class="text-end d-flex align-items-center gap-3">
                            <span class="text-muted-custom small fw-bold">待機組数:</span>
                            <span class="big-counter" id="queue-count">0</span>
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-dark table-striped align-middle border-secondary border-opacity-30">
                            <thead>
                                <tr class="border-bottom border-secondary">
                                    <th style="color: #adb5bd !important;">受付番号</th>
                                    <th style="color: #adb5bd !important;">人数</th>
                                </tr>
                            </thead>
                            <tbody id="queue-tbody">
                                <tr>
                                    <td colspan="3" class="text-center text-muted-custom py-5 fs-5">現在、待機しているグループはありません。</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="custom-card p-4">
                    <h3 class="h4 mb-3 fw-bold"><i class="bi bi-play-circle me-2 text-warning"></i>進行操作</h3>
                    <div class="row g-3">
                        <div class="col-md-5">
                            <button class="btn btn-warning w-100 py-3 fs-5 text-dark fw-bold" onclick="controlQueue('call_next')">
                                <i class="bi bi-megaphone-fill me-2"></i>次の組を呼び出す
                            </button>
                        </div>
                        <div class="col-md-4">
                            <button class="btn btn-outline-danger w-100 py-3 fs-5" onclick="controlQueue('clear_all')">
                                <i class="bi bi-trash3-fill me-2"></i>待機列を全消去
                            </button>
                        </div>
                        <div class="col-md-3">
                            <button class="btn btn-outline-light w-100 py-3 fs-5" onclick="controlQueue('refresh')">
                                <i class="bi bi-arrow-clockwise me-2"></i>更新
                            </button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="modal fade" id="advancedConfigModal" tabindex="-1" aria-labelledby="advancedConfigModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-light" style="background-color: #1a1b20 !important; border: 1px solid #404452 !important;">
                <div class="modal-header border-secondary border-opacity-30">
                    <h5 class="modal-title fw-bold" id="advancedConfigModalLabel">
                        <i class="bi bi-sliders me-2 text-info"></i>時間・範囲の詳細設定
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label for="time_required_range_min" class="form-label">範囲最小値 (min)</label>
                            <input type="number" class="form-control" id="time_required_range_min" name="time_required_range_min" value="{{.Config.TimeRequiredRangeMin}}">
                        </div>
                        <div class="col-6">
                            <label for="time_required_range_max" class="form-label">範囲最大値 (max)</label>
                            <input type="number" class="form-control" id="time_required_range_max" name="time_required_range_max" value="{{.Config.TimeRequiredRangeMax}}">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="serve_start_time" class="form-label">稼働開始</label>
                        <input type="time" class="form-control" id="serve_start_time" name="serve_start_time" value="{{.Config.ServeStartTime}}">
                    </div>
                    <div class="mb-3">
                        <label for="serve_end_time" class="form-label">稼働終了</label>
                        <input type="time" class="form-control" id="serve_end_time" name="serve_end_time" value="{{.Config.ServeEndTime}}">
                    </div>
                </div>
                <div class="modal-footer border-secondary border-opacity-30">
                    <button type="button" class="btn btn-primary w-100 fw-bold" data-bs-dismiss="modal">設定を確定して閉じる</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="anomalyWarningModal" tabindex="-1" aria-labelledby="anomalyWarningModalLabel" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-light border-danger border-opacity-50 shadow-lg" style="background-color: #1c1315 !important; border: 1px solid #dc3545 !important;">
                <div class="modal-header border-danger border-opacity-20 p-3">
                    <h5 class="modal-title fw-bold text-danger" id="anomalyWarningModalLabel">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>異常値検知アラート
                    </h5>
                </div>
                <div class="modal-body p-4">
                    <p class="fs-5 fw-bold mb-3">入力された所要時間が、設定された許容範囲を超えています。</p>
                    
                    <div class="p-3 bg-dark bg-opacity-50 rounded border border-secondary border-opacity-20 mb-3">
                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted-custom">現在の入力値：</span>
                            <span class="fw-bold text-danger fs-5" id="warn-current-value">0 分</span>
                        </div>
                        <div class="d-flex justify-content-between">
                            <span class="text-muted-custom">現在の設定範囲：</span>
                            <span class="fw-bold text-info" id="warn-range-value">0 分 ～ 0 分</span>
                        </div>
                    </div>
                    <p class="text-muted-custom small mb-0">意図した入力であれば「このまま強制適用」を、打ち間違えの場合は「戻って修正」を押してください。</p>
                </div>
                <div class="modal-footer border-danger border-opacity-10 d-flex gap-2">
                    <button type="button" class="btn btn-outline-light flex-grow-1 py-2.5" data-bs-dismiss="modal">戻って修正する</button>
                    <button type="button" class="btn btn-danger flex-grow-1 py-2.5 fw-bold" id="btn-force-submit">このまま強制適用する</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1085;"></div>

    <footer class="w-100 text-center py-3 mt-5">
        <div class="container-fluid">
            <span>©2026 9ramme.net</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const form = document.getElementById("configForm");
            const modal = document.getElementById("advancedConfigModal");
            form.appendChild(modal);
            
            // ページロード時に最初の接続をキック
            connectWS();
        });

        // ★ グローバル変数としてWebSocketインスタンスを保持
        let ws = null;

        // ★ WebSocket接続を確立・再確立する関数
        function connectWS() {
            // もし古い接続が生きていたら、イベントリスナーを解除して安全に閉じる（ゴミ残りのバグ防止）
            if (ws) {
                ws.onopen = null;
                ws.onerror = null;
                ws.onclose = null;
                ws.onmessage = null;
                ws.close();
            }

            // 再接続ボタンを一旦ループさせて非表示、バッジを読み込み中に変更
            document.getElementById('reconnect-btn').classList.add('d-none');
            const badge = document.getElementById('connection-badge');
            badge.className = "badge bg-secondary bg-opacity-10 text-secondary border border-secondary border-opacity-50 px-3 py-2 rounded-pill";
            badge.innerHTML = '<i class="bi bi-circle-fill me-2 small"></i>CONNECTING...';

            const wsProtocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
            ws = new WebSocket(wsProtocol + window.location.host + '/console/ws');

            ws.onopen = () => { 
                console.log('[WS] 管理コンソール接続成功'); 
                badge.className = "badge bg-success bg-opacity-10 text-success border border-success border-opacity-50 px-3 py-2 rounded-pill";
                badge.innerHTML = '<i class="bi bi-circle-fill me-2 small"></i>LIVE CONNECTED';
                showSuccessToast("通信サーバーに接続しました。");
            };

            ws.onerror = (error) => { 
                console.error('[WS] エラー発生:', error); 
            };

            ws.onclose = () => { 
                console.log('[WS] 接続が切断されました'); 
                badge.className = "badge bg-danger bg-opacity-10 text-danger border border-danger border-opacity-50 px-3 py-2 rounded-pill";
                badge.innerHTML = '<i class="bi bi-exclamation-triangle-fill me-2 small"></i>DISCONNECTED';
                
                // ★ 接続が切れたときだけ、再接続ボタンの「d-none（非表示クラス）」を解除して出現させる！
                document.getElementById('reconnect-btn').classList.remove('d-none');
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'queue_update') {
                        updateQueueTable(data.queue);
                    }
                } catch (e) {
                    console.error('[WS] メッセージのパースに失敗:', e);
                }
            };
        }

        function updateQueueTable(queue) {
            const tbody = document.getElementById('queue-tbody');
            const countBadge = document.getElementById('queue-count');
            
            // 1. 待機組数のカウントをリアルタイムに更新
            countBadge.innerText = queue ? queue.length : 0;
            tbody.innerHTML = '';

            // 2. 待機ユーザーが1組以上いる場合のループ処理
            if (queue && queue.length > 0) {
                queue.forEach(group => {
                    const row = `<tr>
                        <td class="fw-bold text-primary" style="font-size: 1.1rem;">#${group.number}</td>
                        <td class="fw-bold text-light">${groupName}</td>
                        <td><span class="badge bg-secondary fs-6 px-3 py-1.5 rounded-pill">${group.size} 名</span></td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            } else {
                // 3. 待機ユーザーが0人の場合のクリーンな表示
                tbody.innerHTML = `<tr><td colspan="3" class="text-center text-muted-custom py-5 fs-5">現在、待機しているグループはありません。</td></tr>`;
            }
        }

        function showSuccessToast(message = "データを更新しました。") {
            const container = document.getElementById('toastContainer');
            const toastWrapper = document.createElement('div');
            toastWrapper.innerHTML = `
                <div class="toast custom-toast text-light show" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="3000">
                    <div class="toast-body d-flex align-items-center py-3 px-4">
                        <i class="bi bi-check-circle-fill text-success fs-4 me-3"></i>
                        <div>
                            <strong class="d-block mb-0.5" style="color: #ffffff;">SUCCESS</strong>
                            <span style="color: #adb5bd; font-size: 0.9rem;">${message}</span>
                        </div>
                        <button type="button" class="btn-close btn-close-white ms-auto m-0" data-bs-dismiss="toast" aria-label="Close"></button>
                    </div>
                </div>
            `.trim();

            const toastNode = toastWrapper.firstChild;
            container.appendChild(toastNode);

            const bootstrapToast = new bootstrap.Toast(toastNode);
            bootstrapToast.show();

            toastNode.addEventListener('hidden.bs.toast', function () {
                toastNode.remove();
            });
        }

        function submitConfig(event, isForced = false) {
            if (event) event.preventDefault();
            const formData = new FormData(document.getElementById('configForm'));

            const timeRequired = parseInt(formData.get('time_required')) || 0;
            const minRange = parseInt(formData.get('time_required_range_min')) || 0;
            const maxRange = parseInt(formData.get('time_required_range_max')) || 0;

            if (!isForced && (timeRequired < minRange || timeRequired > maxRange)) {
                document.getElementById('warn-current-value').innerText = `${timeRequired} 分`;
                document.getElementById('warn-range-value').innerText = `${minRange} 分 ～ ${maxRange} 分`;

                const warningModal = new bootstrap.Modal(document.getElementById('anomalyWarningModal'));
                warningModal.show();

                document.getElementById('btn-force-submit').onclick = function() {
                    warningModal.hide();
                    submitConfig(null, true);
                };
                return false;
            }

            // 接続が切れている時はパケットを送らずに警告トーストを出す（エラーガード）
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                showSuccessToast("エラー: 現在通信が切断されています。再接続を試みてください。");
                return false;
            }

            const payload = {
                page_title: formData.get('page_title'),
                room_name: formData.get('room_name'),
                time_required: timeRequired,
                time_required_range_min: minRange,
                time_required_range_max: maxRange,
                serve_start_time: formData.get('serve_start_time'),
                serve_end_time: formData.get('serve_end_time'),
                infomation: formData.get('infomation'),
                is_booking_available: document.getElementById('switch_booking_available').checked,
                is_service_available: document.getElementById('switch_service_available').checked
            };

            ws.send(JSON.stringify(payload));
            console.log('[WS] 設定をサーバーへ送信しました:', payload);
            showSuccessToast();
            return false;
        }

        function triggerConfigUpdate() { 
            const isChecked = document.getElementById('switch_booking_available').checked;
            document.getElementById('label_booking_status').innerText = isChecked ? "発券受付中" : "発券停止中";

            const isServiceChecked = document.getElementById('switch_service_available').checked;
            document.getElementById('label_service_status').innerText = isServiceChecked ? "サービス稼働中" : "サービス停止中";

            submitConfig({ preventDefault: () => {} }); 
        }

        function controlQueue(action) { 
            let actionName = "更新しました";
            if(action === 'call_next') actionName = "次の組を呼び出しました";
            if(action === 'clear_all') actionName = "待機列を全消去しました";
            
            showSuccessToast(actionName);
        }
    </script>
</body>
</html>
